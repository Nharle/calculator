<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    
    <div class="calcContainer">
        <div class="calcItems">
            <input name="calcInput" class="calcInput" type="text" inputmode="decimal">
            <div class="calcButtons">
                <div class="calcRows">
                    <button class="calcItem" id="clear">CLEAR</button>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem" id="7">7</button></div>
                    <div class="calcItem"><button class="calcItem" id="8">8</button></div>
                    <div class="calcItem"><button class="calcItem" id="9">9</button></div>
                    <div class="calcItem"><button class="calcItem" id="division">÷</button></div>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem" id="4">4</button></div>
                    <div class="calcItem"><button class="calcItem" id="5">5</button></div>
                    <div class="calcItem"><button class="calcItem" id="6">6</button></div>
                    <div class="calcItem"><button class="calcItem" id="multiplication">x</button></div>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem" id="1">1</button></div>
                    <div class="calcItem"><button class="calcItem" id="2">2</button></div>
                    <div class="calcItem"><button class="calcItem" id="3">3</button></div>
                    <div class="calcItem"><button class="calcItem" id="addition">+</button></div>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem" id="decimal">.</button></div>
                    <div class="calcItem"><button class="calcItem" id="0">0</button></div>
                    <div class="calcItem"><button class="calcItem" id="equal">=</button></div>
                    <div class="calcItem"><button class="calcItem" id="subtraction">-</button></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
