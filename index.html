<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    
    <div class="calcContainer">
        <div class="calcItems">
            <input name="calcInput" class="calcInput" type="text" inputmode="decimal">
            <div class="calcButtons">
                <div class="calcRows">
                    <button class="calcItem" id="clear">CLEAR</button>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem">7</button></div>
                    <div class="calcItem"><button class="calcItem">8</button></div>
                    <div class="calcItem"><button class="calcItem">9</button></div>
                    <div class="calcItem"><button class="calcItem">÷</button></div>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem">4</button></div>
                    <div class="calcItem"><button class="calcItem">5</button></div>
                    <div class="calcItem"><button class="calcItem">6</button></div>
                    <div class="calcItem"><button class="calcItem">x</button></div>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem">1</button></div>
                    <div class="calcItem"><button class="calcItem">2</button></div>
                    <div class="calcItem"><button class="calcItem">3</button></div>
                    <div class="calcItem"><button class="calcItem">+</button></div>
                </div>
                <div class="calcRows">
                    <div class="calcItem"><button class="calcItem">.</button></div>
                    <div class="calcItem"><button class="calcItem">0</button></div>
                    <div class="calcItem"><button class="calcItem">=</button></div>
                    <div class="calcItem"><button class="calcItem">-</button></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
